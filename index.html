<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiple Particle Hearts Magic 💖</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        overflow: hidden;
        background: #0a0005; /* Blackish Pink Dark Theme */
        font-family: 'Segoe UI', Arial, sans-serif;
        user-select: none;
    }
    canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
    }
    .ui-container {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 30px 20px;
        z-index: 10;
        pointer-events: none;
    }
    .title {
        color: #ff4d88;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 4px;
        text-shadow: 0 0 15px rgba(255, 77, 136, 0.7);
    }
    .musicText {
        color: rgba(255, 255, 255, 0.8);
        font-size: 15px;
        letter-spacing: 2px;
        background: rgba(255, 77, 136, 0.15);
        padding: 10px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 77, 136, 0.3);
        backdrop-filter: blur(5px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
</style>
</head>
<body>

<div class="ui-container">
    <div class="title">💖 MULTIPLE PARTICLE HEARTS 💖</div>
    <div class="musicText">Tap Anywhere To Play Music & Spawn Hearts 🎵</div>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<canvas id="heartCanvas"></canvas>

<script>
const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let heartSystems = [];

// --- Heart Shape Formula System ---
class Particle {
    constructor(x, y, scale, speedX, speedY, hue) {
        this.baseX = x;
        this.baseY = y;
        this.scale = scale;
        this.speedX = speedX;
        this.speedY = speedY;
        
        // Random particle offset inside heart structure
        this.t = Math.random() * Math.PI * 2;
        this.xOff = 16 * Math.pow(Math.sin(this.t), 3) * this.scale;
        this.yOff = -(13 * Math.cos(this.t) - 5 * Math.cos(2*this.t) - 2 * Math.cos(3*this.t) - Math.cos(4*this.t)) * this.scale;
        
        this.x = this.baseX + this.xOff;
        this.y = this.baseY + this.yOff;
        this.size = Math.random() * 2 + 1;
        this.alpha = 1;
        this.color = `hsla(${hue}, 100%, 65%, `;
        this.fadeSpeed = Math.random() * 0.003 + 0.002;
    }

    update() {
        // Move the entire heart system smoothly
        this.baseX += this.speedX;
        this.baseY += this.speedY;
        
        // Float particles slightly inside the heart
        this.x = this.baseX + this.xOff + Math.sin(Date.now() * 0.003 + this.t) * 2;
        this.y = this.baseY + this.yOff + Math.cos(Date.now() * 0.003 + this.t) * 2;
        
        this.alpha -= this.fadeSpeed;
    }

    draw() {
        ctx.fillStyle = this.color + this.alpha + ")";
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color + "1)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

class HeartSystem {
    constructor(x, y) {
        this.particles = [];
        const particleCount = 120; // Number of glowing dots per heart
        const scale = Math.random() * 1.5 + 1; // Random sizes for different hearts
        const speedX = (Math.random() - 0.5) * 2;
        const speedY = -(Math.random() * 1.5 + 0.5); // Always float upwards smoothly
        const hue = Math.random() * 40 + 330; // Beautiful Pink/Red/Magenta variations

        for (let i = 0; i < particleCount; i++) {
            this.particles.push(new Particle(x, y, scale, speedX, speedY, hue));
        }
    }

    update() {
        this.particles.forEach(p => p.update());
        this.particles = this.particles.filter(p => p.alpha > 0);
    }

    draw() {
        this.particles.forEach(p => p.draw());
    }
}

// Automatically generate random hearts on screen initial spawn
for (let i = 0; i < 5; i++) {
    heartSystems.push(new HeartSystem(Math.random() * canvas.width, Math.random() * canvas.height * 0.7 + canvas.height * 0.2));
}

// --- Main Animation Loop ---
function animate() {
    // Semi-transparent clear creates a gorgeous glowing motion-blur trail effect
    ctx.fillStyle = "rgba(10, 0, 5, 0.3)";
    ctx.shadowBlur = 0; // Reset shadow for background clear
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    heartSystems.forEach(hs => {
        hs.update();
        hs.draw();
    });

    // Remove empty systems
    heartSystems = heartSystems.filter(hs => hs.particles.length > 0);

    // Continuous background random spawning
    if (Math.random() < 0.02 && heartSystems.length < 15) {
        heartSystems.push(new HeartSystem(Math.random() * canvas.width, canvas.height + 50));
    }

    requestAnimationFrame(animate);
}
animate();

// --- Interactive Clicks & Audio Controls ---
const audio = document.getElementById("bgMusic");
const musicTextElement = document.querySelector(".musicText");

window.addEventListener("click", (e) => {
    // 1. Play music securely on first click
    audio.play()
    .then(() => {
        musicTextElement.innerHTML = "🎵 Music Playing • Tap to Spawn Hearts ❤️";
        musicTextElement.style.borderColor = "rgba(0, 255, 150, 0.4)";
        musicTextElement.style.background = "rgba(0, 255, 150, 0.05)";
    })
    .catch(err => console.log("Audio waiting for trigger..."));

    // 2. Spawn a brand new particle heart precisely where the user clicks!
    heartSystems.push(new HeartSystem(e.clientX, e.clientY));
});

// Window resize handler
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
